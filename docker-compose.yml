services:

  db:
    image: postgres:16

    container_name: inventory_db

    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend

    container_name: inventory_backend

    restart: always

    depends_on:
      - db

    env_file:
      - .env

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend

    container_name: inventory_frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "5173:5173"

    environment:
      VITE_API_URL: http://localhost:8000

    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: